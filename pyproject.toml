[tool.coverage.run]
branch = true
source = ["mu"]
omit = ["**/__pycache__/*", ".venv/*", "tests/*"]

[tool.coverage.report]
show_missing = true
skip_empty = true
fail_under = 80
precision = 0

[tool.coverage.xml]
output = "coverage.xml"

