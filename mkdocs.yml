site_name: lang-mu
site_description: Parser and typed decoder for the Mu configuration language.
site_url: https://wabbit-corp.github.io/python-lang-mu/
repo_url: https://github.com/wabbit-corp/python-lang-mu
repo_name: wabbit-corp/python-lang-mu
docs_dir: docs
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      use_pygments: true
      pygments_lang_class: true
  - pymdownx.superfences
nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Typed Decoding: typed-decoding.md
  - Error Handling: errors.md
  - Stable API: api-stable.md
  - Experimental API: api-experimental.md
  - Compatibility: compatibility.md
  - FAQ: faq.md
